name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_BINARY_CACHE: /workspace/vcpkg-cache
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ci-builder

jobs:
  build-image:
    name: Build CI Docker image
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Fetch Dockerfile
        run: |
          mkdir -p /tmp/ci-docker-context
          curl -sSfL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/.github/docker/Dockerfile" \
            -o /tmp/ci-docker-context/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: /tmp/ci-docker-context
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  linux-check:
    name: Quality checks
    needs: build-image
    runs-on: [self-hosted]
    container:
      image: ${{ needs.build-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download other dependencies
        run: bun scripts/setup.ts

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Prepare vcpkg cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Bootstrap vcpkg
        run: sh ./vcpkg/bootstrap-vcpkg.sh

      #########
      # Build and test steps
      - name: Build debug
        run: |
          cmake --workflow --preset clang/debug/install

      - name: Build release
        run: |
          cmake --workflow --preset clang/release/install

      #########
      # Code coverage steps
      - name: Code Coverage
        run: |
          just coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/coverage-html

      - name: Fix workspace ownership for next run
        if: always()
        run: |
          RUNNER_UID=$(stat -c '%u' "$(dirname "${{ github.workspace }}")")
          chown -R "${RUNNER_UID}" "${{ github.workspace }}" || true
