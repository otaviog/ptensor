name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  VCPKG_DEFAULT_BINARY_CACHE: /workspace/vcpkg-cache

jobs:
  linux-check:
    name: Quality checks
    runs-on: [self-hosted]
    container:
      image: ghcr.io/${{ github.repository }}/ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare vcpkg cache
        run: mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Bootstrap vcpkg
        run: sh ./vcpkg/bootstrap-vcpkg.sh

      #########
      # Build and test steps
      - name: Build debug
        run: |
          cmake --workflow --preset clang/debug/install

      - name: Build release
        run: |
          cmake --workflow --preset clang/release/install

      #########
      # Code coverage steps
      - name: Code Coverage
        run: |
          just coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/coverage-html
