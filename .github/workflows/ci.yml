name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  linux-check:
    name: Quality checks
    runs-on: [self-hosted]
    container:
      image: ubuntu:latest

    steps:
      - name: Install dev
        run: |
          apt-get update
          apt-get install -y ninja-build cmake git curl zip pkg-config linux-libc-dev
          apt-get install -y clang-20 clang-tools-20
          apt-get install -y autoconf autoconf-archive automake libtool
          apt-get install -y libx11-dev libxext-dev libwayland-dev wayland-protocols libxkbcommon-dev

          update-alternatives --install /usr/bin/clang clang /usr/bin/clang-20 100
          update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-20 100
          update-alternatives --install /usr/bin/clang-scan-deps clang-scan-deps /usr/bin/clang-scan-deps-20 100

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        run: |
          sh ./vcpkg/bootstrap-vcpkg.sh

      #########
      # Build and test steps
      - name: Build debug
        run: |
          cmake --workflow --preset clang/debug/install

      - name: Build release
        run: |
          cmake --workflow --preset clang/release/install

      #########
      # Code coverage steps
      - name: Code Coverage
        run: |
          just coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/coverage-html
